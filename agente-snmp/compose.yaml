services:
  snmp-agent:
    build:
      context: .
    image: avaliacao-5-snmp-agent:ubuntu-22.04
    container_name: snmp-agent
    hostname: SNMP-Agent-1
    restart: unless-stopped
    ports:
      - "1161:161/udp"
    networks:
      zabbix_frontend:
        aliases:
          - snmp-agent
          - SNMP-Agent-1
    healthcheck:
      test: ["CMD-SHELL", "snmpwalk -v2c -c public localhost 1.3.6.1.2.1.1.1.0 >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  zabbix_frontend:
    external: true
    name: zabbix-docker_frontend
